name: openspace-db

networks:
  openspace_internal:
    driver: bridge

volumes:
  openspace_postgres_data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - openspace_postgres_data:/var/lib/postgresql/data
    networks:
      - openspace_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SIGNING_SECRET: ${JWT_SIGNING_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      ENVIRONMENT_TIER: ${ENVIRONMENT_TIER}
    ports:
      - "${API_PORT}:4000"
    networks:
      - openspace_internal
    working_dir: /repo
    command: sh -c "pnpm --filter @openspace-db/core-db exec prisma migrate deploy --schema prisma/schema.prisma && node apps/api/dist/server.js"

  dashboard:
    build:
      context: ../..
      dockerfile: apps/dashboard/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${DASHBOARD_PORT}:80"
    networks:
      - openspace_internal
